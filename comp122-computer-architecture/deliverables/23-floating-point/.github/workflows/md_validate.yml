name: Markdown (MD) Validator

on:
  push:
    tags:
      - submitted

jobs:
  validate_submission:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # fetch-depth is set to zero to obtain everything ... which includes history, logs., refs

    - name: Validate MD Assignment
      run: make validate

